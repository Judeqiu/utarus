<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Floor plan 3D</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0f1115; color: #e7e5e4; font-family: system-ui, sans-serif; }
      #app { display: flex; flex-direction: column; height: 100%; }
      #toolbar { display: flex; gap: 8px; align-items: center; padding: 8px 12px; border-bottom: 1px solid #292524; background: #1c1917; font-size: 12px; }
      #toolbar button { background: #292524; color: #fafaf9; border: 1px solid #44403c; border-radius: 6px; padding: 4px 10px; cursor: pointer; }
      #toolbar button:hover { background: #3f3f46; }
      #status { margin-left: auto; color: #a8a29e; }
      #c { flex: 1; width: 100%; display: block; touch-action: none; }
      #err { color: #fca5a5; padding: 8px 12px; font-size: 12px; display: none; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <strong id="unitLabel">Floor plan</strong>
        <button type="button" id="btnSave">Save view</button>
        <button type="button" id="btnHighlight">Cycle room</button>
        <span id="status">waiting for host…</span>
      </div>
      <div id="err"></div>
      <canvas id="c"></canvas>
    </div>
    <script src="./vendor/three.min.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
