<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f8fafc">
  <meta name="robots" content="noindex">
  <title>Sign up</title>
  <!-- Framework default page chrome + form styles -->
  <link rel="stylesheet" href="/signup/styles.css">
  <link rel="stylesheet" href="/signup/form.css">
</head>
<body>
  <!--
    Framework default shell. Domains that want a full custom page set
    webUi.signupPage.shell to an HTML file under staticDir that also
    includes #utarus-signup-root + /signup/form.css + /signup/embed.js.
  -->
  <main class="utarus-signup-page">
    <div id="utarus-signup-root"></div>
  </main>
  <script src="/signup/embed.js" defer></script>
</body>
</html>
